<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumier's Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111111;
    --surface: #1e1e1e;
    --surface2: #282828;
    --gold: #C8922A;
    --gold-light: #E5B04A;
    --gold-dim: rgba(200,146,42,0.12);
    --cream: #ffffff;
    --text: #e0e0e0;
    --text-muted: rgba(200,200,200,0.45);
    --border: rgba(255,255,255,0.08);
    --border-gold: rgba(200,146,42,0.2);
    --green: #4CAF7D;
    --red: #E05555;
    --orange: #E09B40;
    --blue: #5B9BD5;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; font-size: 14px; }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo-badge { width: 42px; height: 42px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .header-title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--cream); }
  .header-subtitle { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .last-updated { font-size: 11px; color: var(--text-muted); }
  .refresh-btn {
    background: var(--gold); border: none; color: #111;
    padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 700;
    letter-spacing: 0.5px; transition: all 0.2s; font-family: 'Inter', sans-serif;
  }
  .refresh-btn:hover { background: var(--gold-light); }

  .main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }

  /* Date range tabs */
  .date-tabs {
    display: flex; align-items: center; gap: 4px; margin-bottom: 24px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 4px; width: fit-content; flex-wrap: wrap;
  }
  .date-tab {
    padding: 8px 20px; border-radius: 6px; cursor: pointer;
    font-size: 13px; font-weight: 500; color: var(--text-muted);
    background: transparent; border: none; font-family: 'Inter', sans-serif; transition: all 0.2s;
    white-space: nowrap;
  }
  .date-tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .date-tab.active { background: var(--gold); color: #111; font-weight: 700; }

  /* Custom date range */
  .custom-range {
    display: none;
    align-items: center;
    gap: 6px;
    margin-left: 8px;
    padding-left: 8px;
    border-left: 1px solid var(--border);
  }
  .custom-range.visible { display: flex; }
  .custom-range label { font-size: 12px; color: var(--text-muted); }
  .date-input {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 6px 10px; border-radius: 6px;
    font-size: 12px; font-family: 'Inter', sans-serif; outline: none;
    cursor: pointer;
  }
  .date-input:focus { border-color: var(--gold); }
  .date-sep { color: var(--text-muted); font-size: 13px; }

  /* Stats */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px 22px; position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--gold), transparent);
  }
  .stat-label { font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .stat-value { font-size: 32px; font-weight: 700; color: var(--cream); line-height: 1; }
  .stat-value span { font-size: 16px; color: var(--gold); margin-right: 3px; }
  .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
  .stat-icon { position: absolute; right: 18px; top: 18px; font-size: 24px; opacity: 0.15; }

  /* Toolbar */
  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-btn {
    background: var(--surface); border: 1px solid var(--border); color: var(--text-muted);
    padding: 7px 16px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 500;
    transition: all 0.2s; font-family: 'Inter', sans-serif;
  }
  .filter-btn:hover { color: var(--text); background: var(--surface2); }
  .filter-btn.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }
  .search-input {
    margin-left: auto; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 7px 14px; border-radius: 6px; font-size: 12px;
    width: 220px; font-family: 'Inter', sans-serif; outline: none;
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { border-color: var(--gold); }

  /* Table */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: var(--surface2); padding: 12px 16px; text-align: left;
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.8px; border-bottom: 1px solid var(--border);
  }
  tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.15s; }
  tbody tr:hover { background: rgba(255,255,255,0.03); }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 13px 16px; font-size: 13px; vertical-align: middle; }
  .order-id { font-family: monospace; font-size: 12px; color: var(--text-muted); }
  .customer-name { font-weight: 600; color: var(--cream); }
  .items-text { color: var(--text); max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .price { font-weight: 700; color: var(--gold-light); }
  .arriving { font-size: 12px; color: var(--text-muted); }
  .date-cell { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
  .badge-pending { background: rgba(224,155,64,0.12); color: var(--orange); }
  .badge-pending::before { background: var(--orange); }
  .badge-paid { background: rgba(76,175,125,0.12); color: var(--green); }
  .badge-paid::before { background: var(--green); }
  .badge-completed { background: rgba(91,155,213,0.12); color: var(--blue); }
  .badge-completed::before { background: var(--blue); }
  .badge-not-paid { background: rgba(224,85,85,0.12); color: var(--red); }
  .badge-not-paid::before { background: var(--red); }

  .loading-row td, .empty-row td { text-align: center; padding: 60px; color: var(--text-muted); font-size: 13px; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-banner {
    background: rgba(224,85,85,0.08); border: 1px solid rgba(224,85,85,0.25);
    border-radius: 8px; padding: 14px 18px; color: #E05555;
    font-size: 13px; margin-bottom: 16px; display: none;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo-badge">🔥</div>
    <div>
      <div class="header-title">Lumier's Chimney</div>
      <div class="header-subtitle">შეკვეთების პანელი</div>
    </div>
  </div>
  <div class="header-right">
    <div class="last-updated" id="lastUpdated">—</div>
    <button class="refresh-btn" onclick="loadOrders()">↻ განახლება</button>
  </div>
</div>

<div class="main">

  <div class="error-banner" id="errorBanner"></div>

  <!-- Date tabs -->
  <div class="date-tabs">
    <button class="date-tab active" onclick="setDateRange('today', this)">დღეს</button>
    <button class="date-tab" onclick="setDateRange('7days', this)">7 დღე</button>
    <button class="date-tab" onclick="setDateRange('30days', this)">30 დღე</button>
    <button class="date-tab" onclick="setDateRange('month', this)">ეს თვე</button>
    <button class="date-tab" onclick="setDateRange('custom', this)">თარიღი</button>
    <div class="custom-range" id="customRange">
      <label>დან</label>
      <input class="date-input" type="date" id="dateFrom" onchange="applyCustomRange()">
      <span class="date-sep">—</span>
      <label>მდე</label>
      <input class="date-input" type="date" id="dateTo" onchange="applyCustomRange()">
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon">📋</div>
      <div class="stat-label">სულ შეკვეთები</div>
      <div class="stat-value" id="statTotal">—</div>
      <div class="stat-sub" id="statTotalSub">იტვირთება...</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">⏳</div>
      <div class="stat-label">მოლოდინში</div>
      <div class="stat-value" id="statPending">—</div>
      <div class="stat-sub">შესრულების მოლოდინში</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">💳</div>
      <div class="stat-label">შემოსავალი</div>
      <div class="stat-value" id="statRevenue"><span>₾</span>—</div>
      <div class="stat-sub">მხოლოდ გადახდილი</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">✅</div>
      <div class="stat-label">დასრულებული</div>
      <div class="stat-value" id="statCompleted">—</div>
      <div class="stat-sub">შესრულებული შეკვეთები</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="filter-btn active" onclick="setStatusFilter('all', this)">ყველა</button>
    <button class="filter-btn" onclick="setStatusFilter('pending', this)">მოლოდინში</button>
    <button class="filter-btn" onclick="setStatusFilter('paid', this)">გადახდილი</button>
    <button class="filter-btn" onclick="setStatusFilter('completed', this)">დასრულებული</button>
    <input class="search-input" id="searchInput" type="text" placeholder="🔍  მომხმარებელი ან პროდუქტი..." oninput="renderTable()">
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>შეკვეთის ID</th>
          <th>მომხმარებელი</th>
          <th>პროდუქტი</th>
          <th>ჯამი</th>
          <th>მოვა...</th>
          <th>სტატუსი</th>
          <th>გადახდა</th>
          <th>თარიღი / დრო</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr class="loading-row"><td colspan="8"><div class="spinner"></div><br>შეკვეთები იტვირთება...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
const API_KEY = 'patPgpYbLh6lr8jIt.824d5a14bfe71f05a1a1a62fcd2d8d58fad37d54ad60184506acb618ac01a78d';
const BASE_ID = 'appCgFL9SP2XzSKxm';
const TABLE   = 'orders';
const VENUE   = "lumier's chimney";

let allOrders = [];
let currentDateRange = 'today';
let currentStatusFilter = 'all';
let customFrom = null;
let customTo = null;

// Set default dates for custom inputs
const today = new Date().toISOString().split('T')[0];
document.getElementById('dateFrom').value = today;
document.getElementById('dateTo').value = today;

function getFromDate(range) {
  const d = new Date();
  if (range === 'today') { d.setHours(0,0,0,0); return d; }
  if (range === '7days') { d.setDate(d.getDate()-7); d.setHours(0,0,0,0); return d; }
  if (range === '30days') { d.setDate(d.getDate()-30); d.setHours(0,0,0,0); return d; }
  if (range === 'month') { return new Date(d.getFullYear(), d.getMonth(), 1); }
  if (range === 'custom' && customFrom) return customFrom;
  return d;
}

function getToDate(range) {
  if (range === 'custom' && customTo) {
    const d = new Date(customTo);
    d.setHours(23,59,59,999);
    return d;
  }
  return null;
}

function getRangeLabel(range) {
  if (range === 'today') return 'შუაღამიდან';
  if (range === '7days') return 'ბოლო 7 დღე';
  if (range === '30days') return 'ბოლო 30 დღე';
  if (range === 'month') return 'ამ თვის შეკვეთები';
  if (range === 'custom') return 'მითითებული პერიოდი';
}

function applyCustomRange() {
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;
  if (from) { customFrom = new Date(from); customFrom.setHours(0,0,0,0); }
  if (to) { customTo = new Date(to); customTo.setHours(23,59,59,999); }
  if (currentDateRange === 'custom') loadOrders();
}

async function loadOrders() {
  try {
    showLoading();
    hideError();

    const fromDate = getFromDate(currentDateRange);
    const toDate = getToDate(currentDateRange);

    const fromStr = fromDate.toISOString().split('T')[0];
    let formula = `AND(LOWER({venue_text})="${VENUE}",IS_AFTER({created at},"${fromStr}"))`;
    if (toDate) {
      const toStr = toDate.toISOString().split('T')[0];
      formula = `AND(LOWER({venue_text})="${VENUE}",IS_AFTER({created at},"${fromStr}"),IS_BEFORE({created at},"${toStr}"))`;
    }

    let records = [];
    let offset = null;

    do {
      let url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE}?filterByFormula=${encodeURIComponent(formula)}&pageSize=100&sort%5B0%5D%5Bfield%5D=created+at&sort%5B0%5D%5Bdirection%5D=desc`;
      if (offset) url += `&offset=${offset}`;

      const res = await fetch(url,
        { headers: { Authorization: `Bearer ${API_KEY}` } }
      );

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error?.message || 'Airtable API error');
      }

      const data = await res.json();
      records = records.concat(data.records);
      offset = data.offset;
    } while (offset);

    allOrders = records;
    updateStats();
    renderTable();

    document.getElementById('lastUpdated').textContent =
      'განახლდა: ' + new Date().toLocaleTimeString('ka-GE', { hour: '2-digit', minute: '2-digit' });

  } catch(e) {
    showError(e.message);
  }
}

function updateStats() {
  const total = allOrders.length;
  const pending = allOrders.filter(r => (r.fields['status']||'').toLowerCase()==='pending').length;
  const completed = allOrders.filter(r => (r.fields['status']||'').toLowerCase()==='completed').length;
  const revenue = allOrders
    .filter(r => (r.fields['payment status']||'').toLowerCase()==='paid')
    .reduce((s,r) => s + (parseFloat(r.fields['total price'])||0), 0);

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statCompleted').textContent = completed;
  document.getElementById('statRevenue').innerHTML = `<span>₾</span>${revenue.toFixed(2)}`;
  document.getElementById('statTotalSub').textContent = getRangeLabel(currentDateRange);
}

function setDateRange(range, btn) {
  currentDateRange = range;
  document.querySelectorAll('.date-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const customRange = document.getElementById('customRange');
  if (range === 'custom') {
    customRange.classList.add('visible');
    applyCustomRange();
  } else {
    customRange.classList.remove('visible');
    loadOrders();
  }
}

function setStatusFilter(f, btn) {
  currentStatusFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function renderTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let filtered = allOrders;

  if (currentStatusFilter !== 'all') {
    filtered = filtered.filter(r => {
      const st = (r.fields['status']||'').toLowerCase();
      const pay = (r.fields['payment status']||'').toLowerCase();
      if (currentStatusFilter==='pending') return st==='pending';
      if (currentStatusFilter==='paid') return pay==='paid' && st!=='completed';
      if (currentStatusFilter==='completed') return st==='completed';
      return true;
    });
  }

  if (search) {
    filtered = filtered.filter(r =>
      (r.fields['customer']||'').toLowerCase().includes(search) ||
      (r.fields['items']||'').toLowerCase().includes(search) ||
      (r.fields['order_id']||'').toString().includes(search)
    );
  }

  const tbody = document.getElementById('tableBody');
  if (!filtered.length) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="8">შეკვეთა ვერ მოიძებნა</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(r => {
    const f = r.fields;
    const status = (f['status']||'pending').toLowerCase();
    const payStatus = (f['payment status']||'not paid').toLowerCase();

    let dateStr = '—';
    if (f['created at']) {
      const d = new Date(f['created at']);
      const isToday = d.toDateString() === new Date().toDateString();
      dateStr = isToday
        ? 'დღეს ' + d.toLocaleTimeString('ka-GE', {hour:'2-digit', minute:'2-digit'})
        : d.toLocaleDateString('ka-GE', {day:'2-digit', month:'short'}) + ' ' + d.toLocaleTimeString('ka-GE', {hour:'2-digit', minute:'2-digit'});
    }

    const statusBadge = status==='completed'
      ? `<span class="badge badge-completed">დასრულებული</span>`
      : `<span class="badge badge-pending">მოლოდინში</span>`;

    const payBadge = payStatus==='paid'
      ? `<span class="badge badge-paid">გადახდილი</span>`
      : `<span class="badge badge-not-paid">გადახდილი არ არის</span>`;

    return `<tr>
      <td><span class="order-id">${f['order_id']||'—'}</span></td>
      <td><span class="customer-name">${f['customer']||'—'}</span></td>
      <td><span class="items-text" title="${f['items']||''}">${f['items']||'—'}</span></td>
      <td><span class="price">₾${parseFloat(f['total price']||0).toFixed(2)}</span></td>
      <td><span class="arriving">${f['Arriving in...']||'—'}</span></td>
      <td>${statusBadge}</td>
      <td>${payBadge}</td>
      <td><span class="date-cell">${dateStr}</span></td>
    </tr>`;
  }).join('');
}

function showLoading() {
  document.getElementById('tableBody').innerHTML = `<tr class="loading-row"><td colspan="8"><div class="spinner"></div><br>შეკვეთები იტვირთება...</td></tr>`;
}
function showError(msg) {
  const el = document.getElementById('errorBanner');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
  document.getElementById('tableBody').innerHTML = `<tr class="empty-row"><td colspan="8">ჩატვირთვა ვერ მოხერხდა</td></tr>`;
}
function hideError() { document.getElementById('errorBanner').style.display = 'none'; }

loadOrders();
setInterval(loadOrders, 60000);
</script>
</body>
</html>
